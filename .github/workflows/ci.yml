name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'daily-routine-tracker/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'daily-routine-tracker/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily-routine-tracker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: daily-routine-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t daily-routine-tracker:test daily-routine-tracker/
